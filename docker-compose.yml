services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
    ports:
      - "1433:1433"
    volumes:
      - claims-sql-data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=ClaimsModule;User Id=sa;Password=Your_password123;TrustServerCertificate=True"
      Storage__Provider: "LocalFileSystem"
      ASPNETCORE_URLS: "http://+:8080"
    depends_on:
      - sqlserver

volumes:
  claims-sql-data:
